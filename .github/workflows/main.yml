name: Run Epistemic Engine

on:
  workflow_dispatch:

jobs:
  run-epistemic:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt || true

      - name: Run epistemic engine across temporal window
        run: |
          set -euo pipefail
          WINDOW_START="2026-03-14"
          OBS_ROOT="data/observations"
          for day_dir in $(ls -d "${OBS_ROOT}"/2026-03-* 2>/dev/null | sort); do
            day=$(basename "${day_dir}")
            if [[ "${day}" < "${WINDOW_START}" ]]; then
              continue
            fi
            if [ ! -f "${day_dir}/normalized_observation.json" ]; then
              echo "Skipping ${day}: normalized_observation.json not present"
              continue
            fi
            echo "Running epistemic engine for ${day}"
            python -m scripts.epistemic_engine --observation-root "${day_dir}"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: epistemic-states
          path: data/observations/*/epistemic_state.json
