name: Analysis Pipeline — Build Observations

on:
  # Triggered by AUTO-DZ-ACT-3I-ATLAS-DAILY when a new raw snapshot is ready.
  # Expected payload example: {"date": "YYYY-MM-DD", "daily_repo_ref": "main"}
  repository_dispatch:
    types: [raw-snapshot-available]

  # Manual trigger for backfill or re-processing
  workflow_dispatch:
    inputs:
      date:
        description: >
          Process a specific date (YYYY-MM-DD). Leave empty to process all
          available dates in the raw snapshot repository.
        required: false
        default: ""
      daily_repo_ref:
        description: >
          Git ref (branch/tag/commit SHA) of AUTO-DZ-ACT-3I-ATLAS-DAILY to check out.
        required: false
        default: "main"

  # After analysis PR is merged into main and public/ changes land,
  # publish the already-reviewed public artifacts to the official site repo.
  push:
    branches: [main]
    paths:
      - "public/**"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: analysis-pipeline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-observations:
    name: Build observation dataset
    if: github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout this analysis repository                                #
      # ------------------------------------------------------------------ #
      - name: Checkout analysis repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------------------------------------------ #
      # 2. Checkout the raw-snapshot repository (read-only)                 #
      # ------------------------------------------------------------------ #
      - name: Checkout AUTO-DZ-ACT-3I-ATLAS-DAILY (raw snapshots)
        uses: actions/checkout@v4
        with:
          repository: abdelkader-omran/AUTO-DZ-ACT-3I-ATLAS-DAILY
          ref: ${{ github.event.client_payload.daily_repo_ref || inputs.daily_repo_ref || 'main' }}
          token: ${{ secrets.GH_PAT }}
          path: _daily_repo

      # ------------------------------------------------------------------ #
      # 3. Set up Python                                                     #
      # ------------------------------------------------------------------ #
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ------------------------------------------------------------------ #
      # 4. Resolve the date to process                                       #
      # ------------------------------------------------------------------ #
      - name: Resolve target date
        id: resolve_date
        shell: bash
        run: |
          set -euo pipefail

          DATE="${{ github.event.client_payload.date || inputs.date }}"
          if [ -n "${DATE}" ]; then
            echo "date=${DATE}" >> "${GITHUB_OUTPUT}"
            echo "date_flag=--date ${DATE}" >> "${GITHUB_OUTPUT}"
          else
            echo "date=" >> "${GITHUB_OUTPUT}"
            echo "date_flag=" >> "${GITHUB_OUTPUT}"
          fi

          echo "Resolved date: '${DATE}' (empty = process all available)"

      # ------------------------------------------------------------------ #
      # 5. Run the analysis pipeline                                         #
      # ------------------------------------------------------------------ #
      - name: Run build_observations pipeline
        shell: bash
        run: |
          set -euo pipefail
          python pipeline/build_observations.py \
            --raw-dir "_daily_repo/data/raw" \
            --public-dir "public" \
            ${{ steps.resolve_date.outputs.date_flag }}

      # ------------------------------------------------------------------ #
      # 6. Verify outputs exist                                              #
      # ------------------------------------------------------------------ #
      - name: Verify output files
        shell: bash
        run: |
          set -euo pipefail

          test -f "public/summary.json" || { echo "ERROR: public/summary.json missing"; exit 1; }
          test -f "public/latest.json"  || { echo "ERROR: public/latest.json missing"; exit 1; }

          python - <<'PYEOF'
          import json
          import pathlib

          summary = json.loads(pathlib.Path("public/summary.json").read_text(encoding="utf-8"))
          total_days = summary.get("total_days", -1)
          total_records = summary.get("total_records", -1)

          if not isinstance(total_days, int) or total_days < 0:
              raise ValueError(f"summary.total_days is invalid: {total_days!r}")

          if not isinstance(total_records, int) or total_records < 0:
              raise ValueError(f"summary.total_records is invalid: {total_records!r}")

          print(f"summary.json: {total_days} days, {total_records} records")

          # Verify epistemic_state.json is present for each published day.
          obs_dir = pathlib.Path("public/observations")
          missing = []
          for day_entry in summary.get("days", []):
              date = day_entry.get("date", "")
              if not date:
                  continue
              ep_path = obs_dir / date / "epistemic_state.json"
              if not ep_path.exists():
                  missing.append(str(ep_path))

          if missing:
              raise FileNotFoundError(
                  f"epistemic_state.json missing for {len(missing)} day(s): "
                  + ", ".join(missing)
              )

          print(f"epistemic_state.json verified for {total_days} day(s)")
          PYEOF

      # ------------------------------------------------------------------ #
      # 7. Detect whether public/ changed                                    #
      # ------------------------------------------------------------------ #
      - name: Detect public/ changes
        id: detect_changes
        shell: bash
        run: |
          set -euo pipefail

          git add public/

          if git diff --cached --quiet; then
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
            echo "No changes detected in public/."
          else
            echo "has_changes=true" >> "${GITHUB_OUTPUT}"
            echo "Changes detected in public/."
          fi

      # ------------------------------------------------------------------ #
      # 8. Open a PR instead of pushing directly to main                     #
      # ------------------------------------------------------------------ #
      - name: Create Pull Request for public/ updates
        if: steps.detect_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GH_PAT }}
          commit-message: "pipeline: update public/ observations"
          title: "pipeline: update public/ observations"
          body: |
            Automated update of `public/` observation artifacts generated by the analysis pipeline.

            Source repository:
            - `AUTO-DZ-ACT-3I-ATLAS-DAILY`

            Generated outputs:
            - `public/observations/YYYY-MM-DD.json`
            - `public/observations/YYYY-MM-DD/epistemic_state.json`
            - `public/latest.json`
            - `public/summary.json`

            This PR was opened automatically because direct pushes to `main`
            are blocked by repository rules.
          branch: automation/update-public-observations-${{ github.run_id }}-${{ github.run_attempt }}
          delete-branch: true

      # ------------------------------------------------------------------ #
      # 9. Upload artifacts for CI inspection                                #
      # ------------------------------------------------------------------ #
      - name: Upload public/ as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: observations-${{ steps.resolve_date.outputs.date || 'all' }}-${{ github.run_number }}
          path: public/
          if-no-files-found: warn

  publish-site-artifacts:
    name: Publish reviewed artifacts to trizel-site-artifacts
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout this analysis repository at the reviewed main state      #
      # ------------------------------------------------------------------ #
      - name: Checkout analysis repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ------------------------------------------------------------------ #
      # 2. Verify public/ exists                                             #
      # ------------------------------------------------------------------ #
      - name: Verify public/ exists
        shell: bash
        run: |
          set -euo pipefail
          test -d "public" || { echo "ERROR: public/ directory missing"; exit 1; }
          test -f "public/summary.json" || { echo "ERROR: public/summary.json missing"; exit 1; }

      # ------------------------------------------------------------------ #
      # 3. Publish via Pull Request to site repository                       #
      # ------------------------------------------------------------------ #
      - name: Push artifacts via Pull Request (site repo)
        shell: bash
        env:
          SITE_TOKEN: ${{ secrets.TRIZEL_SITE_DEPLOY_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${SITE_TOKEN}" ]; then
            echo "WARNING: TRIZEL_SITE_DEPLOY_TOKEN is not set — skipping site publish."
            exit 0
          fi

          SITE_REPO="trizel-ai-site/trizel-site-artifacts"
          SITE_DIR="/tmp/trizel-site-artifacts"
          BRANCH="automation/update-site-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          git clone \
            "https://x-access-token:${SITE_TOKEN}@github.com/${SITE_REPO}.git" \
            "${SITE_DIR}"

          mkdir -p "${SITE_DIR}/public"
          rsync -av --delete public/ "${SITE_DIR}/public/"

          cd "${SITE_DIR}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}"

          git add public/

          if git diff --cached --quiet; then
            echo "No changes to publish to site repository."
            exit 0
          fi

          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          git commit -m "pipeline: update site artifacts [${TIMESTAMP}]"
          git push origin "${BRANCH}"

          curl -sS -X POST \
            -H "Authorization: token ${SITE_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${SITE_REPO}/pulls" \
            -d "{
              \"title\": \"pipeline: update site artifacts\",
              \"head\": \"${BRANCH}\",
              \"base\": \"main\",
              \"body\": \"Automated update of site artifacts from AUTO-DZ-ACT-ANALYSIS-3I-ATLAS.\"
            }"
